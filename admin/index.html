<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Print Lab — Správa webu</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="googlebot" content="noindex, nofollow">
  <style>
    /* Loading screen */
    #loading-screen {
      position: fixed; inset: 0;
      background: #1a2355;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999;
      font-family: 'Inter', sans-serif;
      transition: opacity 0.5s ease;
    }
    #loading-screen .logo {
      width: 80px; height: 80px;
      background: #f97316;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 800; color: white;
      margin-bottom: 24px;
      box-shadow: 0 8px 32px rgba(249,115,22,0.4);
    }
    #loading-screen h1 {
      color: white; font-size: 24px; margin: 0 0 8px;
      letter-spacing: 0.05em;
    }
    #loading-screen p {
      color: rgba(255,255,255,0.6); font-size: 14px; margin: 0;
    }
    #loading-screen .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(249,115,22,0.3);
      border-top-color: #f97316;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 32px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>

<!-- Loading screen -->
<div id="loading-screen">
  <div class="logo">PL</div>
  <h1>PRINT LAB</h1>
  <p>Načítám správu webu…</p>
  <div class="spinner"></div>
</div>

<!-- Decap CMS script -->
<script src="https://unpkg.com/decap-cms@3.1.3/dist/decap-cms.js" crossorigin="anonymous"></script>
<script>
  // Skryj loading screen jakmile se CMS načte
  window.addEventListener('load', function() {
    setTimeout(function() {
      const screen = document.getElementById('loading-screen');
      if (screen) {
        screen.classList.add('hidden');
        setTimeout(() => screen.remove(), 500);
      }
    }, 1500);
  });
</script>

</body>
</html>
